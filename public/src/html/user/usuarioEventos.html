<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC - Actividades y eventos</title>
    <link rel="stylesheet" href="../../styles/style_generico.css">
    <link rel="stylesheet" href="../../styles/header_style.css">
    <link rel="stylesheet" href="../../styles/footer_style.css">
    <link rel="stylesheet" href="../../styles/UsuarioViajesCSS.css">
    <script src="./../../scripts/Script_UsuarioEventos.js" type="module"></script>
</head>
<body>
    <main class="contenedor_principal">
        <aside id="buscador" class="panel_blanco">
            <h2 id="viajes">Eventos</h2>
            <input type="search" id="buscar_eventos" class="modal-search" placeholder="Buscar por nombre del evento…" autocomplete="off" aria-label="Buscar evento por nombre">
            <div id="selecciones">
            </div>
        </aside>

        <section id="detalle_lugar" class="panel_blanco">
            <h1 id="titulo">Selecciona un evento</h1>

            <div id="containerImgMapa">
                <img src="./../../media/images/layout/imgLayout4.jpg" id="imgMapa" alt="Vista del evento">
                <div id="desc_overlay">
                    <p id="desc">Selecciona un evento de la lista izquierda para ver más detalles.</p>
                </div>
            </div>

            <h3 class="subtitulo_paquetes">Reservar entrada</h3>
            <div id="paquete">
            </div>
        </section>

        <dialog class="dialog_select" id="fecha_select">
            <h3 class="dialog_h3">Confirma tu reservación</h3>
            <p id="descripcion" class="dialog_p"></p>

            <div class="dialog_inputs dialog_inputs--info">
                <p class="dialog_info_line"><strong>Fecha del evento:</strong> <span id="info_fecha"></span></p>
                <p class="dialog_info_line"><strong>Hora:</strong> <span id="info_hora"></span></p>
            </div>

            <div class="dialog_buttons">
                <button class="btn_aceptar" id="button_continuar">Confirmar</button>
                <button class="btn_cancelar" id="button_noContinuar">Cancelar</button>
            </div>
        </dialog>
    </main>
</body>
</html>
