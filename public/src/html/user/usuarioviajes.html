<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC - Paquetes de Viaje</title>
    <link rel="stylesheet" href="../../styles/style_generico.css">
    <link rel="stylesheet" href="../../styles/header_style.css">
    <link rel="stylesheet" href="../../styles/footer_style.css">
    <link rel="stylesheet" href="../../styles/UsuarioViajesCSS.css">
    <link rel="stylesheet" href="../../components/calendar/calendar.css"> <script src="./../../scripts/Script_usuario_viajes.js" type="module"></script>
</head>
<body>
    <main class="contenedor_principal">
        <aside id="buscador" class="panel_blanco">
            <h2 id="viajes">Lugares</h2>
            <input type="search" id="buscar_lugares" class="modal-search" placeholder="Buscar por nombre del lugar…" autocomplete="off" aria-label="Buscar lugar por nombre">
            <div id="selecciones">
            </div>
        </aside>

        <section id="detalle_lugar" class="panel_blanco">
            <h1 id="titulo">Selecciona un lugar</h1>
            
            <div id="containerImgMapa">
                <img src="./../../media/images/layout/imgLayout4.jpg" id="imgMapa" alt="Vista del lugar">
                <div id="desc_overlay">
                    <p id="desc">Selecciona un destino de la lista izquierda para ver más detalles.</p>
                </div>
            </div>
            
            <h3 class="subtitulo_paquetes">Paquetes Disponibles</h3>
            <div id="paquete">
            </div>
        </section>

        <dialog class="dialog_select" id="fecha_select">
            <h3 class="dialog_h3">Confirma tu reservación</h3>
            <p id="descripcion" class="dialog_p"></p>
            
            <div class="dialog_inputs">
                <label for="fecha">Fecha del viaje:</label>
                <input type="text" id="fecha" readonly placeholder="Haz clic para elegir la fecha" style="cursor: pointer; background-color: #f8f9fa;">
                
                <label for="hora">Hora de salida:</label>
                <input type="time" id="hora" value="08:00">
            </div>

            <div class="dialog_buttons">
                <button class="btn_aceptar" id="button_continuar">Confirmar</button>
                <button class="btn_cancelar" id="button_noContinuar">Cancelar</button>
            </div>
        </dialog>
    </main>
</body>
</html>
